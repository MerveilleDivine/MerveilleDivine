<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Mervine Muganguzi, Software Engineer</title>
  <desc id="desc">A purple and peach engineering-themed profile banner for Mervine Muganguzi.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17131f"/>
      <stop offset="0.55" stop-color="#2a2038"/>
      <stop offset="1" stop-color="#17131f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9b87f5"/>
      <stop offset="0.55" stop-color="#7e69ab"/>
      <stop offset="1" stop-color="#fde1d3"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientTransform="translate(210 60) rotate(25) scale(330 220)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9b87f5" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#9b87f5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientTransform="translate(1050 310) rotate(-150) scale(300 200)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fde1d3" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#fde1d3" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#9b87f5" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="22" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>
  <rect width="1200" height="360" rx="28" fill="url(#glowA)"/>
  <rect width="1200" height="360" rx="28" fill="url(#glowB)"/>

  <g opacity="0.72">
    <circle cx="74" cy="55" r="6" fill="#9b87f5"/>
    <circle cx="98" cy="55" r="6" fill="#fde1d3"/>
    <circle cx="122" cy="55" r="6" fill="#7e69ab"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="755" y="55" width="355" height="250" rx="20" fill="#0f0d14" stroke="#9b87f5" stroke-opacity="0.30"/>
    <rect x="755" y="55" width="355" height="38" rx="20" fill="#1d1727"/>
    <rect x="755" y="73" width="355" height="20" fill="#1d1727"/>
    <circle cx="779" cy="74" r="4" fill="#9b87f5"/>
    <circle cx="794" cy="74" r="4" fill="#fde1d3"/>
    <circle cx="809" cy="74" r="4" fill="#7e69ab"/>
    <text x="832" y="79" fill="#b9afc9" font-family="monospace" font-size="11">mervine.engineer.ts</text>

    <text x="785" y="126" fill="#c586c0" font-family="monospace" font-size="15">const</text>
    <text x="832" y="126" fill="#9cdcfe" font-family="monospace" font-size="15">engineer</text>
    <text x="900" y="126" fill="#d4d4d4" font-family="monospace" font-size="15">= {</text>
    <text x="804" y="158" fill="#9cdcfe" font-family="monospace" font-size="15">build:</text>
    <text x="868" y="158" fill="#ce9178" font-family="monospace" font-size="15">"useful systems"</text>
    <text x="804" y="190" fill="#9cdcfe" font-family="monospace" font-size="15">evaluate:</text>
    <text x="895" y="190" fill="#ce9178" font-family="monospace" font-size="15">"failure modes"</text>
    <text x="804" y="222" fill="#9cdcfe" font-family="monospace" font-size="15">communicate:</text>
    <text x="920" y="222" fill="#ce9178" font-family="monospace" font-size="15">"with clarity"</text>
    <text x="785" y="254" fill="#d4d4d4" font-family="monospace" font-size="15">};</text>
    <rect x="785" y="274" width="112" height="4" rx="2" fill="url(#accent)"/>
  </g>

  <text x="76" y="116" fill="#f7f2fb" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="48" font-weight="700" letter-spacing="-1">Mervine Muganguzi</text>
  <text x="78" y="162" fill="#cfc4dc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="500">Software Engineer · MSc Computer Engineering</text>

  <rect x="78" y="195" width="525" height="3" rx="1.5" fill="url(#accent)"/>

  <text x="78" y="236" fill="#eee7f4" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18">Full-stack products · AI systems · software quality</text>
  <text x="78" y="269" fill="#aaa0b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Build thoughtfully. Evaluate rigorously. Communicate clearly.</text>

  <g transform="translate(78 300)">
    <rect width="132" height="30" rx="15" fill="#9b87f5" fill-opacity="0.14" stroke="#9b87f5" stroke-opacity="0.40"/>
    <text x="66" y="20" text-anchor="middle" fill="#d9d0ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600">PRODUCT ENGINEERING</text>
    <rect x="146" width="112" height="30" rx="15" fill="#fde1d3" fill-opacity="0.11" stroke="#fde1d3" stroke-opacity="0.34"/>
    <text x="202" y="20" text-anchor="middle" fill="#ffe9df" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600">AI EVALUATION</text>
    <rect x="272" width="132" height="30" rx="15" fill="#7e69ab" fill-opacity="0.16" stroke="#9b87f5" stroke-opacity="0.30"/>
    <text x="338" y="20" text-anchor="middle" fill="#d8cee6" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600">TECHNICAL TEACHING</text>
  </g>
</svg>