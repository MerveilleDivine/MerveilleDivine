<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Mervine Muganguzi, Software Engineer</title>
  <desc id="desc">A minimal black and purple editorial banner for Mervine Muganguzi.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09090B"/>
      <stop offset="1" stop-color="#111014"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#7E69AB" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" rx="24" fill="url(#background)"/>
  <rect width="1200" height="320" rx="24" fill="url(#grid)"/>

  <rect x="58" y="48" width="5" height="224" rx="2.5" fill="#7E69AB"/>

  <text x="92" y="78" fill="#9B87F5" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="3">SOFTWARE ENGINEER</text>
  <text x="88" y="151" fill="#F7F5F9" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="650" letter-spacing="-1.5">Mervine Muganguzi</text>
  <text x="91" y="194" fill="#B8B3BE" font-family="Inter, Arial, sans-serif" font-size="18" letter-spacing="0.3">Systems · Product Engineering · Applied AI</text>

  <line x1="91" y1="226" x2="630" y2="226" stroke="#7E69AB" stroke-opacity="0.55"/>

  <text x="91" y="263" fill="#E7E3EA" font-family="Inter, Arial, sans-serif" font-size="16">Useful software, built with care.</text>
  <text x="1110" y="263" text-anchor="end" fill="#B8B3BE" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">mervine.dev</text>

  <text x="1115" y="180" text-anchor="end" fill="none" stroke="#7E69AB" stroke-opacity="0.16" stroke-width="2" font-family="Inter, Arial, sans-serif" font-size="124" font-weight="800" letter-spacing="-8">MM</text>
</svg>
