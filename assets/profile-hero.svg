<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Mervine Muganguzi, Software Engineer</title>
  <desc id="desc">A dark portfolio workspace inspired by mervine.dev, with a lavender grid and a TypeScript editor.</desc>
  <defs>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#7E69AB" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="0%" r="80%">
      <stop offset="0" stop-color="#7E69AB" stop-opacity="0.24"/>
      <stop offset="0.48" stop-color="#7E69AB" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#09090B" stop-opacity="0"/>
    </radialGradient>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="24" fill="#09090B"/>
  <rect width="1200" height="360" rx="24" fill="url(#grid)" opacity="0.72"/>
  <rect width="1200" height="360" rx="24" fill="url(#glow)"/>

  <g filter="url(#panelShadow)">
    <rect x="54" y="36" width="1092" height="288" rx="16" fill="#1F1F1F" stroke="#30363D"/>
    <rect x="54" y="36" width="1092" height="38" rx="16" fill="#181818"/>
    <rect x="54" y="56" width="1092" height="18" fill="#181818"/>

    <circle cx="80" cy="55" r="5" fill="#9B87F5"/>
    <circle cx="98" cy="55" r="5" fill="#FDE1D3"/>
    <circle cx="116" cy="55" r="5" fill="#7E69AB"/>
    <text x="600" y="60" text-anchor="middle" fill="#CCCCCC" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12">mervine.dev — portfolio workspace</text>

    <rect x="54" y="74" width="58" height="250" fill="#181818"/>
    <line x1="112" y1="74" x2="112" y2="324" stroke="#2D2D2D"/>
    <rect x="112" y="74" width="224" height="250" fill="#181818"/>
    <line x1="336" y1="74" x2="336" y2="324" stroke="#2D2D2D"/>

    <text x="134" y="102" fill="#858585" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10" font-weight="700" letter-spacing="1.5">EXPLORER</text>
    <text x="134" y="132" fill="#8B949E" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12">mervine.dev</text>
    <rect x="124" y="145" width="198" height="29" rx="4" fill="#37373D"/>
    <text x="140" y="164" fill="#FFFFFF" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12">mervine.engineer.ts</text>
    <text x="140" y="194" fill="#8B949E" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12">projects.json</text>
    <text x="140" y="222" fill="#8B949E" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12">contact.form.tsx</text>

    <rect x="336" y="74" width="810" height="35" fill="#252526"/>
    <rect x="336" y="74" width="224" height="35" fill="#1E1E1E"/>
    <text x="356" y="96" fill="#D4D4D4" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12">mervine.engineer.ts</text>

    <rect x="336" y="109" width="810" height="187" fill="#1E1E1E"/>
    <line x1="386" y1="109" x2="386" y2="296" stroke="#2D2D2D"/>

    <g font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="14">
      <text x="366" y="138" text-anchor="end" fill="#858585">1</text>
      <text x="366" y="164" text-anchor="end" fill="#858585">2</text>
      <text x="366" y="190" text-anchor="end" fill="#858585">3</text>
      <text x="366" y="216" text-anchor="end" fill="#858585">4</text>
      <text x="366" y="242" text-anchor="end" fill="#858585">5</text>
      <text x="366" y="268" text-anchor="end" fill="#858585">6</text>

      <text x="406" y="138" fill="#C586C0">const</text>
      <text x="453" y="138" fill="#9CDCFE">mervine</text>
      <text x="520" y="138" fill="#D4D4D4">= {</text>

      <text x="426" y="164" fill="#9CDCFE">role:</text>
      <text x="486" y="164" fill="#CE9178">"Software Engineer"</text>
      <text x="655" y="164" fill="#D4D4D4">,</text>

      <text x="426" y="190" fill="#9CDCFE">degree:</text>
      <text x="504" y="190" fill="#CE9178">"MSc Computer Engineering"</text>
      <text x="732" y="190" fill="#D4D4D4">,</text>

      <text x="426" y="216" fill="#9CDCFE">builds:</text>
      <text x="496" y="216" fill="#CE9178">["full-stack products", "AI-enabled systems"]</text>
      <text x="866" y="216" fill="#D4D4D4">,</text>

      <text x="426" y="242" fill="#9CDCFE">caresAbout:</text>
      <text x="536" y="242" fill="#CE9178">["clarity", "quality", "people"]</text>
      <text x="821" y="242" fill="#D4D4D4">,</text>

      <text x="406" y="268" fill="#D4D4D4">};</text>
    </g>

    <rect x="336" y="296" width="810" height="28" fill="#7E69AB"/>
    <text x="354" y="315" fill="#FFFFFF" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10">main</text>
    <text x="1128" y="315" text-anchor="end" fill="#FFFFFF" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10">TypeScript React</text>
  </g>
</svg>